# =====================================================================
# YOLO Dataset Configuration File
# =====================================================================

# 1. Paths to your dataset split folders
path: ./my_dataset      # The root directory of your dataset
train: train/images     # Training images path (relative to 'path')
val: val/images         # Validation images path (relative to 'path')

# 2. Number of classes
nc: 1

# 3. Class Names Mapping
# This maps the YOLO index 0 to your actual label name
names:
  0: Healthy
  